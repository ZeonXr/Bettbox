name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  SHOULD_RELEASE: ${{ !contains(github.ref, '-') || contains(github.ref_name, 'pre') }}
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none
  
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-24.04
            arch: arm64
          - platform: android
            os: ubuntu-24.04
            arch: amd64
          - platform: android
            os: ubuntu-24.04
            arch: arm
          - platform: android
            os: ubuntu-24.04
            arch: universal
          - platform: windows
            os: windows-2025
            arch: amd64
          - platform: windows
            os: windows-11-arm
            arch: arm64
          - platform: macos
            os: macos-15
            arch: arm64
          - platform: macos
            os: macos-15
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
            compatible: true
          - platform: windows
            os: windows-2022
            arch: amd64
            compatible: true
          - platform: macos
            os: macos-15
            arch: amd64
            compatible: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Rust (Windows ARM64 native runner)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          # Download the official ARM64 Rust installer from rustup.rs over HTTPS.
          # win.rustup.rs serves the canonical rustup-init.exe signed by the Rust project.
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Setup Rust
        if: matrix.platform == 'windows' && matrix.os != 'windows-11-arm'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Keystore
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          
      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Install Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev ninja-build libgtk-3-dev rpm

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.compatible == true && '1.20.x' || '1.24.x' }}
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ (matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'windows-11-arm') && 'master' || 'stable' }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: ${{ (matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'windows-11-arm') && '' || '3.35.7' }}

      - name: Clean Gradle
        if: matrix.platform == 'android'
        run: |
          cd android
          flutter clean

      - name: Build Bettbox
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }} ${{ matrix.compatible == true && '--compatible' || '' }}

      - name: Verify Windows PE Architecture
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $buildArch = if ($arch -eq "arm64") { "arm64" } else { "x64" }
          $exePath = "build\windows\$buildArch\runner\Release\Bettbox.exe"

          if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found at $exePath"
            exit 1
          }

          $bytes = [System.IO.File]::ReadAllBytes($exePath)
          $peOffset = [System.BitConverter]::ToInt32($bytes, 0x3C)
          $machine  = [System.BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $machineHex = "{0:X4}" -f $machine

          Write-Host "Arch: $arch | File: $exePath | PE Machine: 0x$machineHex"

          # PE Machine type constants (COFF header field at offset 4 from PE signature):
          #   0xAA64 = IMAGE_FILE_MACHINE_ARM64
          #   0x8664 = IMAGE_FILE_MACHINE_AMD64
          $expected = @{ "arm64" = "AA64"; "amd64" = "8664" }

          if ($expected.ContainsKey($arch) -and $machineHex -ne $expected[$arch]) {
            Write-Error "PE machine mismatch! Expected $($expected[$arch]) for $arch, got $machineHex. Aborting to prevent publishing a wrong-arch artifact."
            exit 1
          }

          Write-Host "✓ PE machine validation passed: 0x$machineHex ($arch)"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.compatible == true && '-compatible' || '' }}
          path: ./dist
          compression-level: 9
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v7
        with:
          path: ./dist/
          pattern: Bettbox-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          echo "- Fixes and improvements" > release.md

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [ "${{ env.IS_PRERELEASE }}" == "true" ]; then
            sed "s|VERSION|$version|g" ./.github/release_template_pre.md >> release.md
          else
            sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md
          fi

      - name: Release
        if: ${{ env.SHOULD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}