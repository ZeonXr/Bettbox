name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  SHOULD_RELEASE: ${{ !contains(github.ref, '-') || contains(github.ref_name, 'pre') }}
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none
  
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-24.04
            arch: arm64
          - platform: android
            os: ubuntu-24.04
            arch: amd64
          - platform: android
            os: ubuntu-24.04
            arch: arm
          - platform: android
            os: ubuntu-24.04
            arch: universal
          - platform: windows
            os: windows-2025
            arch: amd64
          - platform: windows
            os: windows-11-arm
            arch: arm64
          - platform: macos
            os: macos-15
            arch: arm64
          - platform: macos
            os: macos-15
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
            compatible: true
          - platform: windows
            os: windows-2022
            arch: amd64
            compatible: true
          - platform: macos
            os: macos-15
            arch: amd64
            compatible: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Rust (Windows ARM64 native)
        if: matrix.platform == 'windows' && matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Setup Rust (Windows x64)
        if: matrix.platform == 'windows' && matrix.os != 'windows-11-arm'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Keystore
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          
      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Install Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev ninja-build libgtk-3-dev rpm

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.compatible == true && '1.20.x' || '1.24.x' }}
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ (matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'windows-11-arm') && 'master' || 'stable' }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: ${{ (matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'windows-11-arm') && '' || '3.35.7' }}

      - name: Clean Gradle
        if: matrix.platform == 'android'
        run: |
          cd android
          flutter clean

      - name: Build Bettbox
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }} ${{ matrix.compatible == true && '--compatible' || '' }}

      - name: Verify Windows ARM64 PE machine type
        if: matrix.platform == 'windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Recurse -Filter "Bettbox.exe" "dist" | Select-Object -First 1
          if (-not $exePath) {
            # Fall back to checking the zip artifact
            $zipFile = Get-ChildItem -Recurse -Filter "*.zip" "dist" | Select-Object -First 1
            if ($zipFile) {
              $extractDir = Join-Path $env:TEMP "bettbox_verify"
              Expand-Archive -Path $zipFile.FullName -DestinationPath $extractDir -Force
              $exePath = Get-ChildItem -Recurse -Filter "Bettbox.exe" $extractDir | Select-Object -First 1
            }
          }
          if (-not $exePath) { throw "Bettbox.exe not found in dist" }
          Write-Host "Checking PE machine type of: $($exePath.FullName)"
          $bytes = [System.IO.File]::ReadAllBytes($exePath.FullName)
          $lfaNew = [BitConverter]::ToInt32($bytes, 0x3C)
          $machine = [BitConverter]::ToUInt16($bytes, $lfaNew + 4)
          $machineHex = "0x{0:X4}" -f $machine
          Write-Host "PE Machine type: $machineHex"
          # 0xAA64 = IMAGE_FILE_MACHINE_ARM64
          if ($machine -ne 0xAA64) {
            throw "Expected ARM64 (0xAA64) but got $machineHex. The artifact is not a native ARM64 binary."
          }
          Write-Host "✓ ARM64 PE machine type (0xAA64) verified"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.compatible == true && '-compatible' || '' }}
          path: ./dist
          compression-level: 9
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v7
        with:
          path: ./dist/
          pattern: Bettbox-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          echo "- Fixes and improvements" > release.md

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [ "${{ env.IS_PRERELEASE }}" == "true" ]; then
            sed "s|VERSION|$version|g" ./.github/release_template_pre.md >> release.md
          else
            sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md
          fi

      - name: Release
        if: ${{ env.SHOULD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}